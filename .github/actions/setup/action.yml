name: Setup
description: >-
  Provision Node and pnpm and install dependencies. pnpm comes from Corepack so
  the version resolves from package.json's "packageManager" field, matching what
  developer workstations run. Node comes from .nvmrc.

runs:
  using: composite
  steps:
    - name: Enable Corepack
      run: corepack enable
      shell: bash

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
